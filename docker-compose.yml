services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: leadlink
      POSTGRES_USER: leadlink
      POSTGRES_PASSWORD: leadlink
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U leadlink"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://leadlink:leadlink@postgres:5432/leadlink
      NODE_ENV: development
    ports:
      - "3000:3000"

volumes:
  postgres_data:
